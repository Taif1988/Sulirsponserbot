<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title id="pageTitle">اعلاناتي</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=Cairo:wght@400;500;600&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark" id="brandMark">اعلاناتي</span>
      <span class="brand-sub" id="brandSub"></span>
    </div>
    <div class="header-actions">
      <div class="lang-switch" id="langSwitch">
        <button class="lang-btn active" data-lang="ar">AR</button>
        <button class="lang-btn" data-lang="ku">KU</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button id="myAdsBtn" class="icon-btn" data-i18n="myAds">إعلاناتي</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-type="sale" data-i18n="tabSale">للبيع</button>
    <button class="tab" data-type="job" data-i18n="tabJob">وظائف</button>
  </div>

  <div class="search-row">
    <input id="searchInput" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="ابحث عن شي..." />
  </div>

  <div id="categoryChips" class="chips"></div>
</header>

<main id="feed" class="feed">
  <div class="empty-state" id="emptyState" hidden>
    <div class="empty-mark">📋</div>
    <p data-i18n="emptyTitle">ما فيه إعلانات هسه بهذا التصنيف</p>
    <p class="empty-sub" data-i18n="emptySub">كن أول من ينشر إعلان!</p>
  </div>
</main>

<button id="fab" class="fab" data-i18n="fabPost">+ نشر إعلان</button>

<!-- نموذج نشر إعلان -->
<div id="postSheet" class="sheet" hidden>
  <div class="sheet-inner">
    <div class="sheet-header">
      <h2 data-i18n="postTitle">نشر إعلان جديد</h2>
      <button class="close-btn" data-close="postSheet">✕</button>
    </div>

    <div class="sheet-body">
      <label class="field-label" data-i18n="typeLabel">نوع الإعلان</label>
      <div class="segmented" id="typeSegmented">
        <button type="button" class="seg active" data-value="sale" data-i18n="segSale">بيع</button>
        <button type="button" class="seg" data-value="job" data-i18n="segJob">وظيفة</button>
      </div>

      <label class="field-label" data-i18n="categoryLabel">التصنيف</label>
      <select id="categorySelect"></select>

      <label class="field-label" data-i18n="titleLabel">العنوان</label>
      <input id="titleInput" type="text" data-i18n-placeholder="titlePlaceholder" placeholder="مثال: آيفون 13 برو للبيع" maxlength="80" />

      <label class="field-label" data-i18n="descLabel">الوصف</label>
      <textarea id="descInput" data-i18n-placeholder="descPlaceholder" placeholder="اكتب تفاصيل الإعلان..." rows="4" maxlength="600"></textarea>

      <label class="field-label" id="priceLabel" data-i18n="priceLabelSale">السعر (اختياري)</label>
      <input id="priceInput" type="text" data-i18n-placeholder="pricePlaceholder" placeholder="مثال: 150,000 د.ع أو قابل للتفاوض" />

      <label class="field-label" data-i18n="imageLabel">صورة (اختياري)</label>
      <input id="imageInput" type="file" accept="image/*" />
      <img id="imagePreview" hidden />

      <button id="submitAdBtn" class="primary-btn" data-i18n="submitBtn">نشر الإعلان</button>
      <p class="hint" data-i18n="hint">راح يتم مراجعة إعلانك قبل ظهوره للجميع ✓</p>
    </div>
  </div>
</div>

<!-- تفاصيل إعلان -->
<div id="detailSheet" class="sheet" hidden>
  <div class="sheet-inner" id="detailContent"></div>
</div>

<!-- إعلاناتي -->
<div id="myAdsSheet" class="sheet" hidden>
  <div class="sheet-inner">
    <div class="sheet-header">
      <h2 data-i18n="myAdsTitle">إعلاناتي</h2>
      <button class="close-btn" data-close="myAdsSheet">✕</button>
    </div>
    <div class="sheet-body" id="myAdsList"></div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
